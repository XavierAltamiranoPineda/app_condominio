name: app_condominio
description: "App móvil para gestión de condominios - Sistema integral de administración"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Iconos
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  badges: ^3.1.2

  # Navegación
  go_router: ^14.2.7

  # Estado
  provider: ^6.1.2

  # HTTP & Red
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # Almacenamiento seguro
  flutter_secure_storage: ^9.2.2

  # Cache local
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Variables de entorno
  flutter_dotenv: ^5.2.1

  # Formularios & Utilidades
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.5.1
  dartz: ^0.10.1

  # Notificaciones
  flutter_local_notifications: ^17.2.4

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Permisos
  permission_handler: ^11.3.1

  # Fechas y tiempo
  table_calendar: ^3.1.2
  syncfusion_flutter_charts: ^27.1.58

  # PDF / Reportes
  pdf: ^3.11.1
  printing: ^5.13.2
  open_file: ^3.3.2
  path_provider: ^2.1.4

  # Imagen
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - .env

